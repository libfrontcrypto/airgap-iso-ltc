  <circle cx="64" cy="64" r="64" fill="#C2A633" />
  <text x="64" y="86" font-size="64" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif">Ð</text>
</svg>